<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sapo Extension — Cài đặt</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>⚙️ Cài đặt Extension</h1>

    <!-- GEMINI -->
    <section class="card">
      <h2>🔷 Gemini Popup</h2>
      <label for="geminiUrl">URL</label>
      <input type="url" id="geminiUrl" placeholder="https://gemini.google.com/...">
      <div class="row">
        <div class="field">
          <label for="geminiWidth">Rộng (px)</label>
          <input type="number" id="geminiWidth" min="400" max="2000">
        </div>
        <div class="field">
          <label for="geminiHeight">Cao (px)</label>
          <input type="number" id="geminiHeight" min="300" max="1500">
        </div>
      </div>
    </section>

    <!-- CLAUDE -->
    <section class="card">
      <h2>🟠 Claude Popup</h2>
      <label for="claudeUrl">URL</label>
      <input type="url" id="claudeUrl" placeholder="https://claude.ai/...">
      <div class="row">
        <div class="field">
          <label for="claudeWidth">Rộng (px)</label>
          <input type="number" id="claudeWidth" min="400" max="2000">
        </div>
        <div class="field">
          <label for="claudeHeight">Cao (px)</label>
          <input type="number" id="claudeHeight" min="300" max="1500">
        </div>
      </div>
    </section>
 
    <!-- LỤC HÀO WEB -->
    <section class="card">
      <h2>🔮 Web Lập Quẻ Lục Hào</h2>
      <label for="luchaoUrl">URL Trang Web / API</label>
      <input type="url" id="luchaoUrl" placeholder="https://dshc-luc-hao.vercel.app/">
    </section>

    <!-- OCR QUÉT SERI -->
    <section class="card">
      <h2>🔍 Quét Seri Tự Động (OCR)</h2>
      <label for="geminiApiKey">Gemini API Keys (Tối đa 5 Key để dự phòng)</label>
      <input type="password" id="geminiApiKey" placeholder="Key 1 (Chính): AIza...">
      <input type="password" id="geminiApiKey2" placeholder="Key 2 (Dự phòng)" style="margin-top:6px;">
      <input type="password" id="geminiApiKey3" placeholder="Key 3 (Dự phòng)" style="margin-top:6px;">
      <input type="password" id="geminiApiKey4" placeholder="Key 4 (Dự phòng)" style="margin-top:6px;">
      <input type="password" id="geminiApiKey5" placeholder="Key 5 (Dự phòng)" style="margin-top:6px;">
      <p style="color:#94a3b8;font-size:12px;margin-top:4px;">Lấy API key miễn phí tại <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#60a5fa;">Google AI Studio</a></p>
      <label for="geminiModel" style="margin-top:8px;">Model AI</label>
      <select id="geminiModel" style="width:100%;padding:8px;border-radius:8px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;font-size:13px;">
        <option value="gemini-3.1-flash-lite">🏆 Gemini 3.1 Flash Lite — 500 lượt/ngày</option>
        <option value="gemini-2.5-flash-lite">⚡ Gemini 2.5 Flash Lite — 20 lượt/ngày</option>
        <option value="gemini-3.5-flash">🔵 Gemini 3.5 Flash — 20 lượt/ngày</option>
        <option value="gemini-3-flash">🟢 Gemini 3 Flash — 20 lượt/ngày</option>
        <option value="gemini-2.5-flash">🔷 Gemini 2.5 Flash — 20 lượt/ngày</option>
      </select>
      <p style="color:#94a3b8;font-size:11px;margin-top:4px;">Nếu hết quota model này, extension tự thử model khác</p>
    </section>

    <!-- BUSINESS -->
    <section class="card">
      <h2>🟩 Business Popup</h2>
      <div class="row">
        <div class="field">
          <label for="businessWidth">Rộng (px)</label>
          <input type="number" id="businessWidth" min="400" max="2000">
        </div>
        <div class="field">
          <label for="businessHeight">Cao (px)</label>
          <input type="number" id="businessHeight" min="300" max="1500">
        </div>
      </div>
    </section>

    <!-- BUTTONS -->
    <div class="actions">
      <button id="btnSave" class="btn-save">💾 Lưu</button>
      <button id="btnReset" class="btn-reset">↩ Mặc định</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
